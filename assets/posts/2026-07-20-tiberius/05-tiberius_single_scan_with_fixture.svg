<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A single scan runs each probe once through optional buff mutations, the LLM generator, and a detector. Each prompt variant gets a binary pass or fail. Results are serialized to a JSON fixture. The success rate is the relative frequency of attacks that got through.</desc>
